{% extends "base.html" %}
{% block title %}Mapa — Costco MTY Alert{% endblock %}

{% block head %}
<style>
  #map { height: 70vh; }
  .costco-marker {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    background: transparent;
    border: none;
  }
</style>
{% endblock %}

{% block content %}
<div class="p-4">
  <header class="bg-white shadow-sm rounded-lg p-4 mb-4">
    <h1 class="text-2xl font-bold text-gray-800">Costco MTY Alert</h1>
    <p class="text-gray-500 text-sm mt-1">Monitoreo de incidentes en tiempo real</p>
  </header>

  <div class="rounded-lg shadow-md overflow-hidden">
    <div id="map"></div>
  </div>

  <footer class="text-sm text-gray-500 p-4 text-center">
    Datos actualizados: <span id="last-update">—</span>
  </footer>
</div>
{% endblock %}

{% block scripts %}
<script>
  const COSTCO_LOCATIONS = [
    { name: "Carretera Nacional", lat: 25.6026, lng: -100.2640, key: "carretera_nacional" },
    { name: "Cumbres", lat: 25.7353, lng: -100.4022, key: "cumbres" },
    { name: "Valle Oriente", lat: 25.6457, lng: -100.3072, key: "valle_oriente" }
  ];
  const RADIUS_METERS = 3000;

  const map = L.map('map').setView([25.6767, -100.3161], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  COSTCO_LOCATIONS.forEach(costco => {
    L.marker([costco.lat, costco.lng], {
      icon: L.divIcon({
        html: '🛒',
        className: 'costco-marker',
        iconSize: [32, 32]
      })
    }).addTo(map).bindPopup(`<b>Costco ${costco.name}</b>`);

    L.circle([costco.lat, costco.lng], {
      radius: RADIUS_METERS,
      color: '#dc2626',
      fillColor: '#fca5a5',
      fillOpacity: 0.1,
      weight: 2
    }).addTo(map);
  });

  document.getElementById('last-update').textContent =
    new Date().toLocaleString('es-MX', { timeZone: 'America/Monterrey' });
</script>
{% endblock %}
