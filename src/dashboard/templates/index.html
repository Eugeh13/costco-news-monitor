{% extends "base.html" %}
{% block title %}Mapa — Costco MTY Alert{% endblock %}

{% block head %}
<style>
  #map {
    height: 70vh;
    min-height: 500px;
    width: 100%;
  }
  #map-error {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 70vh;
    min-height: 500px;
    background: #1e1e1e;
    color: #ff6b6b;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    border: 1px solid #333;
    border-radius: 4px;
  }
</style>

<script>
  // Coordinates from Google Geocoding API (ROOFTOP precision)
  const COSTCO_LOCATIONS = [
    { name: "Carretera Nacional", lat: 25.577970, lng: -100.251028, key: "carretera_nacional" },
    { name: "Cumbres", lat: 25.729656, lng: -100.392913, key: "cumbres" },
    { name: "Valle Oriente", lat: 25.639695, lng: -100.317631, key: "valle_oriente" }
  ];
  const RADIUS_METERS = 3000;
</script>

{% if maps_browser_key %}
<script>

  function _costcoSvgIcon(color) {
    const svg = [
      '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">',
      '<circle cx="20" cy="20" r="18" fill="' + color + '" stroke="#ffffff" stroke-width="2"/>',
      '<text x="20" y="27" font-size="18" text-anchor="middle">&#x1F6D2;</text>',
      '</svg>'
    ].join('');
    return {
      url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
      scaledSize: new google.maps.Size(40, 40),
      anchor: new google.maps.Point(20, 20)
    };
  }

  function _incidentSvgIcon(severity) {
    let color;
    if (severity >= 8) color = '#dc2626';
    else if (severity >= 5) color = '#f97316';
    else color = '#16a34a';
    const svg = [
      '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">',
      '<circle cx="10" cy="10" r="8" fill="' + color + '" stroke="#ffffff" stroke-width="1.5"/>',
      '</svg>'
    ].join('');
    return {
      url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
      scaledSize: new google.maps.Size(20, 20),
      anchor: new google.maps.Point(10, 10)
    };
  }

  function initMap() {
    const map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 25.6767, lng: -100.3161 },
      zoom: 12,
      mapTypeId: 'roadmap',
      fullscreenControl: true,
      streetViewControl: false
    });

    const infoWindow = new google.maps.InfoWindow();

    // Costco markers and 3km radius circles
    COSTCO_LOCATIONS.forEach(function(costco) {
      const marker = new google.maps.Marker({
        position: { lat: costco.lat, lng: costco.lng },
        map: map,
        title: 'Costco ' + costco.name,
        icon: _costcoSvgIcon('#0066cc')
      });

      marker.addListener('click', function() {
        infoWindow.setContent('<b>Costco ' + costco.name + '</b>');
        infoWindow.open(map, marker);
      });

      new google.maps.Circle({
        map: map,
        center: { lat: costco.lat, lng: costco.lng },
        radius: RADIUS_METERS,
        strokeColor: '#dc2626',
        strokeOpacity: 0.8,
        strokeWeight: 2,
        fillColor: '#fca5a5',
        fillOpacity: 0.1
      });
    });

    // Load and render incident markers from API
    fetch('/api/incidents?since=24h&within_radius_only=true&limit=100')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        (data.incidents || []).forEach(function(inc) {
          if (inc.geo_lat == null || inc.geo_lon == null) return;
          const sev = inc.severity_score != null ? inc.severity_score : 0;
          const marker = new google.maps.Marker({
            position: { lat: inc.geo_lat, lng: inc.geo_lon },
            map: map,
            title: inc.article_title,
            icon: _incidentSvgIcon(sev)
          });
          marker.addListener('click', function() {
            const dist = inc.distance_km != null ? inc.distance_km + ' km' : '—';
            const content = [
              '<div style="max-width:280px;font-size:13px;line-height:1.5">',
              '<b>' + inc.article_title + '</b><br>',
              '<span style="color:#666">' + inc.incident_type + ' · sev ' + (sev || '?') + '</span><br>',
              inc.nearest_costco ? 'Cerca: ' + inc.nearest_costco + '<br>' : '',
              'Distancia: ' + dist + '<br>',
              '<a href="' + inc.article_url + '" target="_blank" rel="noopener">Ver artículo</a>',
              '</div>'
            ].join('');
            infoWindow.setContent(content);
            infoWindow.open(map, marker);
          });
        });
      })
      .catch(function(err) {
        console.error('Error loading incidents:', err);
      });

    document.getElementById('last-update').textContent =
      new Date().toLocaleString('es-MX', { timeZone: 'America/Monterrey' });
  }
</script>
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key={{ maps_browser_key }}&callback=initMap&v=weekly">
</script>
{% else %}
<script>
  window.addEventListener('DOMContentLoaded', function() {
    const mapDiv = document.getElementById('map');
    mapDiv.id = 'map-error';
    mapDiv.innerHTML = '<p>GOOGLE_MAPS_BROWSER_KEY no configurada — agrégala como variable de entorno.</p>';
  });
</script>
{% endif %}
{% endblock %}

{% block content %}
<div class="p-4">
  <header class="bg-white shadow-sm rounded-lg p-4 mb-4">
    <h1 class="text-2xl font-bold text-gray-800">Costco MTY Alert</h1>
    <p class="text-gray-500 text-sm mt-1">Monitoreo de incidentes en tiempo real</p>
  </header>

  <div class="rounded-lg shadow-md overflow-hidden">
    <div id="map"></div>
  </div>

  <footer class="text-sm text-gray-500 p-4 text-center">
    Datos actualizados: <span id="last-update">—</span>
  </footer>
</div>
{% endblock %}
