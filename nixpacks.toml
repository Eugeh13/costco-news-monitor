# nixpacks.toml - Costco News Monitor v3
# Configuración para Railway con soporte de Playwright/Chromium

[phases.setup]
# Dependencias del sistema para Chromium/Playwright (paquetes Debian/Ubuntu)
aptPkgs = [
  "chromium",
  "chromium-driver",
  "fonts-liberation",
  "libappindicator3-1",
  "libasound2",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libcups2",
  "libdbus-1-3",
  "libgdk-pixbuf2.0-0",
  "libnspr4",
  "libnss3",
  "libx11-xcb1",
  "libxcomposite1",
  "libxcursor1",
  "libxdamage1",
  "libxfixes3",
  "libxi6",
  "libxrandr2",
  "libxss1",
  "libxtst6",
  "xdg-utils",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  # Instalar Playwright pero usar chromium del sistema (evita descarga de CDN)
  "PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 playwright install chromium || true",
]

[variables]
# Decirle a Playwright que use el chromium del sistema
PLAYWRIGHT_BROWSERS_PATH = "/usr/bin"
# Evitar que crawl4ai intente descargar navegador
CRAWL4AI_BROWSER_EXECUTABLE_PATH = "/usr/bin/chromium"

[start]
cmd = "python3.11 run_scheduled_v2.py"
